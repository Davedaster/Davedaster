name: Patch latest customer update badge

on:
  push:
    branches:
      - safe-latest-customer-update-badge

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: safe-latest-customer-update-badge
      - name: Apply latest badge patch
        run: |
          python <<'PY'
          from pathlib import Path

          driver_path = Path('app/routes/driver.routes.$token.tsx')
          driver = driver_path.read_text()

          driver = driver.replace(
              'const CUSTOMER_NOTIFICATION_ACTIONS = ["Out for delivery sent", "You are next sent", "Delay update sent", "Booked slot recipient notified"];',
              'const CUSTOMER_NOTIFICATION_ACTIONS = ["Delivery follow up completed", "Out for delivery sent", "You are next sent", "Delay update sent", "Booked slot recipient notified"];',
          )

          driver = driver.replace(
              '''function notificationStatusFromAction(action: string): CustomerNotificationStatus | null {\n  if (action === "You are next sent") return { label: "You are next sent", tone: "green" };\n  if (action === "Out for delivery sent") return { label: "Out for delivery sent", tone: "blue" };\n  if (action === "Delay update sent") return { label: "Delay update sent", tone: "amber" };\n  if (action === "Booked slot recipient notified") return { label: "Booked slot sent", tone: "grey" };\n  return null;\n}''',
              '''function notificationStatusFromAction(action: string, details = ""): CustomerNotificationStatus | null {\n  if (action === "Delivery follow up completed" && /[1-9]\\d* SMS sent/.test(details)) return { label: "Delivery complete SMS sent", tone: "green" };\n  if (action === "You are next sent") return { label: "You are next sent", tone: "green" };\n  if (action === "Out for delivery sent") return { label: "Out for delivery sent", tone: "blue" };\n  if (action === "Delay update sent") return { label: "Delay update sent", tone: "amber" };\n  if (action === "Booked slot recipient notified") return { label: "Booked slot sent", tone: "grey" };\n  return null;\n}''',
          )

          driver = driver.replace(
              '''function detailsIncludeAnyOrderId(details: string, orderIds: string[]) {\n  return orderIds.some((orderId) => details.includes(`orderId:${orderId}`));\n}''',
              '''function detailsIncludeAnyOrderId(details: string, orderIds: string[]) {\n  return orderIds.some((orderId) => details.includes(`orderId:${orderId}`));\n}\n\nfunction detailsIncludeAnyOrderNumber(details: string, orderNumbers: string[]) {\n  return orderNumbers.some((orderNumber) => orderNumber && details.includes(orderNumber));\n}''',
          )

          driver = driver.replace(
              '''  const stops = route.stops.map((stop) => ({\n    id: stop.id,\n    orderIds: stop.deliveryGroup?.orders.map((order) => order.id) || [],\n  }));''',
              '''  const stops = route.stops.map((stop) => ({\n    id: stop.id,\n    orderIds: stop.deliveryGroup?.orders.map((order) => order.id) || [],\n    orderNumbers: stop.deliveryGroup?.orders.map((order) => order.shopifyOrderNumber).filter(Boolean) || [],\n  }));''',
          )

          driver = driver.replace(
              '''    const status = notificationStatusFromAction(event.action);\n    const details = event.details || "";''',
              '''    const details = event.details || "";\n    const status = notificationStatusFromAction(event.action, details);''',
          )

          driver = driver.replace(
              '''      if (event.action === "Booked slot recipient notified") {\n        if (detailsIncludeAnyOrderId(details, stop.orderIds)) {\n          statuses[stop.id] = status;\n        }\n        continue;\n      }\n\n      if (details.includes(`stopId:${stop.id}`)) {''',
              '''      if (event.action === "Booked slot recipient notified") {\n        if (detailsIncludeAnyOrderId(details, stop.orderIds)) {\n          statuses[stop.id] = status;\n        }\n        continue;\n      }\n\n      if (event.action === "Delivery follow up completed") {\n        if (details.includes(`stopId:${stop.id}`) || detailsIncludeAnyOrderNumber(details, stop.orderNumbers)) {\n          statuses[stop.id] = status;\n        }\n        continue;\n      }\n\n      if (details.includes(`stopId:${stop.id}`)) {''',
          )

          driver_path.write_text(driver)

          pod_path = Path('app/lib/proofOfDelivery.server.ts')
          pod = pod_path.read_text()
          pod = pod.replace(
              'details: `Shopify: ${shopifyResults.join(", ")}. Delivery complete notifications: ${notificationResult.smsSent} SMS sent, ${notificationResult.emailsSent} emails sent, ${notificationResult.skipped} skipped, ${notificationResult.failed} failed${notificationErrorDetails}`,',
              'details: `stopId:${input.stopId}. Shopify: ${shopifyResults.join(", ")}. Delivery complete notifications: ${notificationResult.smsSent} SMS sent, ${notificationResult.emailsSent} emails sent, ${notificationResult.skipped} skipped, ${notificationResult.failed} failed${notificationErrorDetails}`,',
          )
          pod_path.write_text(pod)
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'app/routes/driver.routes.$token.tsx' app/lib/proofOfDelivery.server.ts
          git rm .github/workflows/patch-latest-badge.yml
          if git diff --cached --quiet; then
            echo "No patch changes to commit"
            exit 0
          fi
          git commit -m "Show latest completed delivery notification badge"
          git push
