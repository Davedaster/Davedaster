name: Generate permanent driver upload state

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/permanent-driver-upload-state'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Apply existing upload-state transformation once
        run: node scripts/hotfix-driver-route-upload-state.mjs

      - name: Remove migrated hotfix from package scripts
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const packagePath = "package.json";
          const packageJson = JSON.parse(readFileSync(packagePath, "utf8"));
          const command = "node scripts/hotfix-driver-route-upload-state.mjs && ";

          for (const scriptName of ["prebuild", "pretypecheck"]) {
            const current = packageJson.scripts?.[scriptName];
            if (typeof current !== "string" || !current.includes(command)) {
              throw new Error(`Expected ${scriptName} to contain the upload-state hotfix.`);
            }
            packageJson.scripts[scriptName] = current.replace(command, "");
          }

          writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE
          rm scripts/hotfix-driver-route-upload-state.mjs

      - name: Verify intended files only
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";

          const expected = [
            "app/routes/driver.routes.$token.tsx",
            "package.json",
            "scripts/hotfix-driver-route-upload-state.mjs",
          ].sort();
          const output = execFileSync("git", ["status", "--porcelain=v1"], { encoding: "utf8" }).trim();
          const actual = output
            ? output.split("\n").map((line) => line.slice(3)).sort()
            : [];

          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            throw new Error(`Unexpected generated files: ${JSON.stringify(actual)}`);
          }
          NODE
          git diff --check

      - name: Type check permanent source
        run: npx tsc --noEmit

      - name: Build permanent source
        run: npx remix vite:build

      - name: Confirm checks did not change tracked files
        run: |
          node --input-type=module <<'NODE'
          import { execFileSync } from "node:child_process";

          const expected = [
            "app/routes/driver.routes.$token.tsx",
            "package.json",
            "scripts/hotfix-driver-route-upload-state.mjs",
          ].sort();
          const output = execFileSync("git", ["status", "--porcelain=v1"], { encoding: "utf8" }).trim();
          const actual = output
            ? output.split("\n").map((line) => line.slice(3)).sort()
            : [];

          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            throw new Error(`Checks changed unexpected files: ${JSON.stringify(actual)}`);
          }
          NODE

      - name: Commit generated permanent source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Move driver upload state into permanent source"
          git push origin HEAD:${{ github.head_ref }}
