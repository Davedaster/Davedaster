name: Validate permanent driver upload source

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

jobs:
  validate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/permanent-driver-upload-state-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Type check using project scripts
        run: npm run typecheck
      - name: Build using project scripts
        run: npm run build
