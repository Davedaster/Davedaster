name: Diagnose permanent driver upload source

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'agent/permanent-driver-upload-state-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install --no-package-lock
      - name: Capture project typecheck output
        run: |
          npm run typecheck > project-typecheck-output.txt 2>&1 || true
          test -s project-typecheck-output.txt
      - name: Commit diagnostic output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project-typecheck-output.txt
          git commit -m "Capture permanent upload typecheck output"
          git push origin HEAD:${{ github.head_ref }}
