name: Agent clean notification template

on:
  push:
    branches:
      - agent/migrate-notification-hotfixes

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20.19.0

      - name: Remove unused template constant
        run: node scripts/agent-clean-notification-template.mjs

      - name: Check patch formatting
        run: git diff --check

      - name: Commit template cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove unused SMS review constant"
          git push origin HEAD:${{ github.ref_name }}
