name: Apply driver POD completion preflight retry

on:
  push:
    branches:
      - agent/offline-pod-master-build-retry

permissions:
  contents: write

jobs:
  apply-and-check:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/offline-pod-master-build-retry
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 20.19.0

      - run: npm ci
      - run: node scripts/apply-driver-pod-completion-preflight.mjs

      - name: Verify intended source files changed
        run: |
          git diff --name-only | sort > /tmp/changed-files.txt
          printf '%s\n' \
            'app/lib/driverProofDrafts.client.ts' \
            'app/routes/driver.routes.$token.completion-status.ts' | sort > /tmp/expected-files.txt
          diff -u /tmp/expected-files.txt /tmp/changed-files.txt

      - run: npm run typecheck
      - run: npm run build

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/driverProofDrafts.client.ts 'app/routes/driver.routes.$token.completion-status.ts'
          git commit -m "Protect POD retries before proof upload"
          git push origin HEAD:agent/offline-pod-master-build-retry
